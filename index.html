<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kivanc Toper | Vehicle Dynamics & Aerodynamics</title>
    <style>
        /* Base Styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            color: #2c3e50;
            background-color: #f8f9fa;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header Section */
        header {
            padding: 3rem 0 2rem;
            border-bottom: 2px solid #e9ecef;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 2.8rem;
            margin-bottom: 0.2rem;
            color: #1a1a1a;
            letter-spacing: -0.5px;
        }
        p.subtitle {
            font-size: 1.25rem;
            color: #6c757d;
            margin-top: 0;
            font-weight: 500;
        }
        .contact-links a {
            color: #0056b3;
            text-decoration: none;
            font-weight: 600;
            margin-right: 15px;
        }
        .contact-links a:hover {
            text-decoration: underline;
        }

        /* About Section */
        .about-section {
            font-size: 1.1rem;
            margin-bottom: 3rem;
        }

        /* Projects Section */
        h2 {
            font-size: 1.8rem;
            color: #1a1a1a;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 0.5rem;
        }
        .project {
            background: #ffffff;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
            margin-bottom: 2rem;
            border: 1px solid #e9ecef;
        }
        .project h3 {
            margin-top: 0;
            margin-bottom: 0.5rem;
            color: #212529;
            font-size: 1.4rem;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
        }
        .tag {
            background: #e9ecef;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #495057;
            font-weight: 500;
        }

        /* Image Scaling */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            margin-top: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #dee2e6;
        }

        /* Footer */
        footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid #e9ecef;
            text-align: center;
            color: #adb5bd;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Kivanc Toper</h1>
            <p class="subtitle">Mechanical Engineering | Vehicle Dynamics & Aerodynamics</p>
            <p class="contact-links">
                <a href="mailto:ktoper74@gmail.com">ktoper74@gmail.com</a>
                <a href="https://github.com/yourusername" target="_blank">GitHub</a>
                <a href="https://linkedin.com/in/yourusername" target="_blank">LinkedIn</a>
            </p>
        </header>

        <section class="about-section">
            <p>In construction</p>
        </section>

       
        <footer>
            <p>&copy; 2026 Kivanc Toper. Hosted on GitHub Pages.</p>
        </footer>
    </div>

</body>
</html>
